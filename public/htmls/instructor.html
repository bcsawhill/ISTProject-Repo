  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/HomLogo.png" alt="YogaTrack Logo" class="logo">
    </a>
    
    <button class="hamburger-menu" aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav">

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Instructors ▾</button>
        <div class="nav-dropdown-menu">
          <a href="instructor.html">Add New Instructor</a>
          <a href="instructor-search.html">Search/Edit Instructors</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Packages ▾</button>
        <div class="nav-dropdown-menu">
          <a href="package-sale.html">Package Sale</a>
          <a href="package-sales.html">Package Records</a>
          <a href="package-edit.html">Edit Packages</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Classes ▾</button>
        <div class="nav-dropdown-menu">

    </nav>
  </aside>

  <main class="layout--center">
    <div class="instInfoContainer">
      <h1>Enter Instructor Info</h1>
      <form class="card" id="instructorForm">
        <label class="instinfolabel" for="firstName">First:</label>
        <input type="text" id="firstName" name="firstName" required>

        <label class="instinfolabel" for="lastName">Last:</label>
        <input type="text" id="lastName" name="lastName" required>

        <label class="instinfolabel" for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label class="instinfolabel" for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label class="instinfolabel" for="address">Address:</label>
        <textarea id="address" name="address"></textarea>

        <fieldset>
          <legend>Preferred Contact</legend>
          <div class="radio-row">
            <label><input type="radio" name="pref" value="phone">Phone</label>
            <label><input type="radio" name="pref" value="email">Email</label>
          </div>
        </fieldset>

        <div id="accountFieldsWrapper" style="margin-top: 1rem;">
          <label class="instinfolabel" for="username">Username:</label>
          <input type="text" id="username" name="username" autocomplete="off" required>

          <label class="instinfolabel" for="password">Temporary Password:</label>
          <input type="password" id="password" name="password" minlength="8" required>

          <small>Create login credentials for the instructor account.</small>
        </div>

        <button id="instructorsubmit" class="btn" type="submit">Submit</button>
      </form>
    </div>
  </main>

  <script src="../js/instructor.js"></script>
  <script src="../js/sidebarRoleUI.js"></script>
</body>
</html>
