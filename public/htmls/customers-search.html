<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Customers</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .customerSearchContainer {
      width: min(1120px, calc(100vw - 2rem));
      margin: 0 auto;
    }

    .customerSearchContainer .card {
      width: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }

    .search-bar-container {
      width: 100%;
      margin-bottom: 1rem;
    }

    .search-input {
      width: 100%;
      box-sizing: border-box;
    }

    .results-table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    .results-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    .results-table th,
    .results-table td {
      padding: 0.85rem 0.65rem;
      vertical-align: middle;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }

    .results-table th:nth-child(1),
    .results-table td:nth-child(1) {
      width: 9%;
    }

    .results-table th:nth-child(2),
    .results-table td:nth-child(2) {
      width: 18%;
    }

    .results-table th:nth-child(3),
    .results-table td:nth-child(3) {
      width: 22%;
    }

    .results-table th:nth-child(4),
    .results-table td:nth-child(4) {
      width: 15%;
    }

    .results-table th:nth-child(5),
    .results-table td:nth-child(5) {
      width: 11%;
      text-align: center;
    }

    .results-table th:nth-child(6),
    .results-table td:nth-child(6) {
      width: 11%;
      text-align: center;
    }

    .results-table th:nth-child(7),
    .results-table td:nth-child(7) {
      width: 14%;
    }

    .results-table td:nth-child(2),
    .results-table td:nth-child(3) {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .actions-cell {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.45rem;
    }

    .actions-cell .btn {
      width: 100%;
      min-width: 0;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
      line-height: 1.15;
      text-align: center;
    }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      line-height: 1.1;
    }

    .status-badge--active {
      background: #e8f7ed;
      color: #1f6f3b;
      border: 1px solid #b9e1c4;
    }

    .status-badge--inactive {
      background: #fdecec;
      color: #8a1f1f;
      border: 1px solid #f2b9b9;
    }

    .status-badge--none {
      background: #f3f3f3;
      color: #666;
      border: 1px solid #ddd;
    }

    @media (max-width: 1000px) {
      .results-table th,
      .results-table td {
        padding: 0.7rem 0.5rem;
        font-size: 0.92rem;
      }

      .actions-cell .btn {
        font-size: 0.84rem;
        padding: 0.4rem 0.5rem;
      }

      .status-badge {
        font-size: 0.78rem;
        padding: 0.25rem 0.45rem;
      }
    }
  </style>
</head>

<body class="layout--sidebar">

  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/HomLogo.png" class="logo">
    </a>
    <nav class="nav">

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Instructors ▾</button>
        <div class="nav-dropdown-menu">
          <a href="instructor.html">Add New Instructor</a>
          <a href="instructor-search.html">Search/Edit Instructors</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Packages ▾</button>
        <div class="nav-dropdown-menu">
          <a href="package-sale.html">Package Sale</a>
          <a href="package-sales.html">Package Records</a>
          <a href="package-edit.html">Edit Packages</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Classes ▾</button>
        <div class="nav-dropdown-menu">
          <a href="class-schedule.html">Class Schedule</a>
          <a href="class-checkin.html">Class Check-In</a>
          <a href="class-records.html">Class Records</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Customers ▾</button>
        <div class="nav-dropdown-menu">
          <a href="customers.html">Add New Customer</a>
          <a href="customers-search.html">Search/Edit Customer</a>
        </div>
      </div>

      <div id="nav-waiver-link">
        <a href="waiver.html">Waiver</a>
      </div>

      <a href="../index.html">Log Out</a>
    </nav>
  </aside>

  <main class="layout--center">
    <div class="customerSearchContainer">
      <div class="card card--wide">
        <h1 class="page-title">Search Customers</h1>

        <div class="search-bar-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by name, email, or phone"
          >
        </div>

        <div class="results-table-wrapper">
          <table class="results-table" id="resultsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Class Balance</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="editModal" class="modal hidden">
      <div class="modal-content card">
        <h2>Edit Customer</h2>

        <form id="editForm">
          <input type="hidden" id="edit_customerId">

          <label>First Name</label>
          <input type="text" id="edit_firstName">

          <label>Last Name</label>
          <input type="text" id="edit_lastName">

          <label>Email</label>
          <input type="email" id="edit_email">

          <label>Phone</label>
          <input type="tel" id="edit_phone">

          <label>Address</label>
          <textarea id="edit_address"></textarea>

          <label>Class Balance</label>
          <input type="number" id="edit_classBalance">

          <label>Senior</label>
          <input type="checkbox" id="edit_senior">

          <div id="roleFieldWrapper" style="display:none;">
            <label>User Role</label>
            <select id="edit_role">
              <option value="member">Member</option>
              <option value="instructor">Instructor</option>
              <option value="staff">Staff</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn">Save Changes</button>
          <button type="button" id="closeModal" class="btn">Cancel</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/customerSearch.js"></script>
  <script src="../js/sidebarRoleUI.js"></script>
</body>
</html>
