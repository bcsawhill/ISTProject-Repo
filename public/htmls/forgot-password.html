<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="layout--center">
  <main class="card card--wide">
    <h1>Reset Password</h1>
    <p>Enter your username, email, and phone number exactly as they appear on your account.</p>

    <p id="resetMessage" class="error-message" style="display:none;"></p>

    <form id="resetForm">
      <label for="username">Username</label>
      <input type="text" id="username" required>

      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" required>

      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" minlength="8" required>

      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" minlength="8" required>

      <button class="btn btn--primary" type="submit">Reset Password</button>
    </form>

    <p style="margin-top: 12px;">
      <a href="/index.html">Back to login</a>
    </p>
  </main>

  <script>
    function setMessage(message, isError = true) {
      const box = document.getElementById("resetMessage");
      box.textContent = message;
      box.style.display = "block";
      box.style.color = isError ? "#8a1f1f" : "#1f6f3b";
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!username || !email || !phone || !newPassword || !confirmPassword) {
        setMessage("Please fill in all fields.");
        return;
      }

      if (newPassword !== confirmPassword) {
        setMessage("Passwords do not match.");
        return;
      }

      if (newPassword.length < 8) {
        setMessage("Password must be at least 8 characters.");
        return;
      }

      try {
        const res = await fetch("/api/forgot-password/reset", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            email,
            phone,
            newPassword,
            confirmPassword
          })
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.message || "Failed to reset password.");
        }

        document.getElementById("resetForm").reset();
        setMessage(result.message || "Password reset successfully.", false);
      } catch (err) {
        setMessage(err.message || "Failed to reset password.");
      }
    });
  </script>
</body>
</html>
