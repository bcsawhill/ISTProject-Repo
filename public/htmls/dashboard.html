<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack • Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="background">
    <div class="overlay">
      <div class="layout--sidebar">
        <aside class="sidebar">
          <a class="logo-wrap" href="dashboard.html">
            <img src="../images/HomLogo.png" alt="YogiTrack Logo" class="logo" />
          </a>

          <nav class="nav">
            <div class="nav-dropdown" id="nav-instructors">
              <button class="nav-dropdown-btn">Instructors ▾</button>
              <div class="nav-dropdown-menu">
                <a href="instructor.html">Add New Instructor</a>
                <a href="instructor-search.html">Search/Edit Instructors</a>
              </div>
            </div>

            <div class="nav-dropdown" id="nav-packages">
              <button class="nav-dropdown-btn">Packages ▾</button>
              <div class="nav-dropdown-menu">
                <a href="package-sale.html">Package Sale</a>
                <a href="package-sales.html">Package Records</a>
                <a href="package-edit.html">Edit Packages</a>
              </div>
            </div>

            <div class="nav-dropdown" id="nav-classes">
              <button class="nav-dropdown-btn">Classes ▾</button>
              <div class="nav-dropdown-menu">
                <a href="class-schedule.html">Class Schedule</a>
                <a href="class-checkin.html">Class Check-In</a>
                <a href="class-records.html" class="active">Class Records</a>
              </div>
            </div>

            <div class="nav-dropdown" id="nav-customers">
              <button class="nav-dropdown-btn">Customers ▾</button>
              <div class="nav-dropdown-menu">
                <a href="customers.html">Add New Customer</a>
                <a href="customers-search.html">Search/Edit Customer</a>
              </div>
            </div>

            <div id="nav-waiver-link">
              <a href="waiver.html">Waiver</a>
            </div>

            <a href="../index.html">Log Out</a>
          </nav>
        </aside>
      </div>
    </div>
  </div>

 <script>
async function applyRoleUI() {
  try {
    const res = await fetch("/api/me");
    if (!res.ok) {
      window.location.href = "/index.html";
      return;
    }

    const user = await res.json();

    const navInstructors = document.getElementById("nav-instructors");
    const navPackages = document.querySelector("#nav-packages .nav-dropdown-menu");
    const navClasses = document.querySelector("#nav-classes .nav-dropdown-menu");
    const navCustomers = document.querySelector("#nav-customers .nav-dropdown-menu");
    const navWaiver = document.getElementById("nav-waiver-link");

    if (user.role === "member") {
      ["nav-instructors", "nav-packages", "nav-customers"].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      if (navClasses) {
        navClasses.innerHTML = `<a href="class-checkin.html">Class Check-In</a>`;
      }
      return;
    }

    if (navWaiver) {
      navWaiver.style.display = "none";
    }

    if (user.role === "staff") {
      if (navInstructors) navInstructors.style.display = "none";

      if (navPackages) {
        navPackages.innerHTML = `
          <a href="package-sale.html">Package Sale</a>
          <a href="package-sales.html">Package Records</a>
        `;
      }

      if (navClasses) {
        navClasses.innerHTML = `
          <a href="class-checkin.html">Class Check-In</a>
          <a href="class-records.html">Class Records</a>
        `;
      }

      return;
    }

    if (user.role === "instructor") {
      if (navInstructors) navInstructors.style.display = "none";

      if (navPackages) {
        navPackages.innerHTML = `
          <a href="package-sale.html">Package Sale</a>
        `;
      }

      if (navClasses) {
        navClasses.innerHTML = `
          <a href="class-checkin.html">Class Check-In</a>
        `;
      }

      if (navCustomers) {
        navCustomers.innerHTML = `
          <a href="customers.html">Add New Customer</a>
          <a href="customers-search.html">Search/Edit Customer</a>
        `;
      }
    }
  } catch (err) {
    window.location.href = "/index.html";
  }
}

document.querySelectorAll(".nav-dropdown-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    btn.parentElement.classList.toggle("open");
  });
});

applyRoleUI();
</script>
</body>
</html>
