<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yoga H'om • Welcome</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="layout--center">
  <main class="card card--wide text--center">
    <img src="images/HomLogo.png" alt="Yoga H'om Logo" class="logo">
    <h1>Welcome to Yoga H'om</h1>
    <p>Your all-in-one studio management companion.</p>

    <p id="error-message" class="error-message" style="display:none;"></p>

    <h2>Login</h2>
    <form action="/login" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button class="btn btn--primary" type="submit">Login</button>
    </form>

    <p style="margin-top: 12px;">
      <a href="/htmls/forgot-password.html">Forgot password?</a>
    </p>

    <hr>

    <h2>Create Account</h2>
    <p style="margin-top: 12px;">Don’t have an account?</p>
    <a class="btn" href="/htmls/register.html">Create one here</a>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const errorBox = document.getElementById("error-message");

    if (error) {
      let message = "";

      if (error === "login_failed") {
        message = "Invalid username or password.";
      } else if (error === "missing_fields") {
        message = "Please fill in all required fields.";
      } else if (error === "account_inactive") {
        message = "This account is inactive. Please contact an administrator.";
      }

      if (message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      window.history.replaceState({}, document.title, "/index.html");
    }
  </script>
</body>
</html>
